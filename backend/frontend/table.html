<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>จองโต๊ะ – Kaiseki Omakase</title>
  <link rel="stylesheet" href="css/tables.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="top-nav">
    <a href="index.html" class="nav-logo">Kaiseki Omakase</a>
    <div class="nav-right">
      <span id="nav-user" class="nav-user"></span>
      <button class="btn-outline" onclick="logout()">ออกจากระบบ</button>
    </div>
  </nav>

  <div class="tables-container">

    <!-- LEFT: Table map -->
    <div class="tables-left">
      <div class="tables-header">
        <span class="section-label">Reservation</span>
        <h2>Table Reservation</h2>
        <p>เลือกโต๊ะที่ต้องการ</p>
      </div>

      <div class="legend">
        <div class="legend-item"><span class="legend-dot available"></span>ว่าง</div>
        <div class="legend-item"><span class="legend-dot reserved"></span>จองแล้ว</div>
        <div class="legend-item"><span class="legend-dot occupied"></span>ใช้บริการอยู่</div>
      </div>

      <div class="tables-grid" id="tables-grid">
        <div class="table-skeleton"></div>
        <div class="table-skeleton"></div>
        <div class="table-skeleton"></div>
        <div class="table-skeleton"></div>
        <div class="table-skeleton"></div>
        <div class="table-skeleton"></div>
      </div>

      <p class="realtime-note">อัปเดตสถานะทุก 5 วินาที</p>
    </div>

    <!-- RIGHT: Reservation form -->
    <div class="tables-right" id="reservation-panel">

      <div class="panel-placeholder" id="panel-placeholder">
        <div class="placeholder-icon">— —</div>
        <p>เลือกโต๊ะทางซ้ายเพื่อกรอกข้อมูลการจอง</p>
      </div>

      <div class="reservation-form" id="reservation-form" style="display:none">
        <h3>กรอกข้อมูลการจอง</h3>
        <div class="selected-table-badge" id="selected-table-info"></div>

        <div id="res-error" class="error-box" style="display:none"></div>
        <div id="res-success" class="success-box" style="display:none"></div>

        <div class="form-row">
          <div class="form-group">
            <label>Firstname</label>
            <input type="text" id="res-firstname" placeholder="ชื่อ"/>
          </div>
          <div class="form-group">
            <label>Lastname</label>
            <input type="text" id="res-lastname" placeholder="นามสกุล"/>
          </div>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="res-phone" placeholder="0812345678"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="res-email" placeholder="your@email.com"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>วันที่</label>
            <input type="date" id="res-date"/>
          </div>
          <div class="form-group">
            <label>เวลา</label>
            <input type="time" id="res-time"/>
          </div>
        </div>
        <div class="form-group">
          <label>จำนวนคน</label>
          <input type="number" id="res-people" min="1" max="10" placeholder="2"/>
        </div>
        <div class="form-group">
          <label>Special Request</label>
          <textarea id="res-special" placeholder="แพ้อาหาร, ขอเค้กวันเกิด..."></textarea>
        </div>

        <button class="btn-main" onclick="submitReservation()">ยืนยันการจอง</button>
        <button class="btn-ghost" onclick="cancelSelection()">ยกเลิก</button>
      </div>

    </div>
  </div>

  <script src="js/tables.js">
    const API = 'http://localhost:3000'
  </script>
</body>
</html>
