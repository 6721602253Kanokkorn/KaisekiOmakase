<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>จองโต๊ะ – Kaiseki Omakase</title>
  <link rel="stylesheet" href="css/booking.css"/>
</head>
<body>

  <div class="auth-bg"></div>

  <div class="container">

    <!-- ซ้าย -->
    <div class="left-section">
      <a href="index.html" class="back-link">← Home</a>
      <h1>Kaiseki<br>Omakase</h1>

      <div class="booking-steps">
        <div class="step active">
          <div class="step-num">1</div>
          <span>กรอกข้อมูล</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="step2">
          <div class="step-num">2</div>
          <span>เลือกโต๊ะ</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="step3">
          <div class="step-num">3</div>
          <span>ยืนยัน</span>
        </div>
      </div>
    </div>

    <!-- ขวา -->
    <div class="auth-card">
      <h2>Booking</h2>
      <p class="auth-desc">กรอกข้อมูลให้ครบแล้วกดเลือกโต๊ะ</p>

      <div id="error-msg" class="error-box" style="display:none"></div>

      <div class="form-row">
        <div class="form-group">
          <label>Firstname</label>
          <input type="text" id="firstname" placeholder="ชื่อ"/>
        </div>
        <div class="form-group">
          <label>Lastname</label>
          <input type="text" id="lastname" placeholder="นามสกุล"/>
        </div>
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="phone" placeholder="0812345678"/>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com"/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>วันที่จอง</label>
          <input type="date" id="date"/>
        </div>
        <div class="form-group">
          <label>เวลา</label>
          <input type="time" id="time"/>
        </div>
      </div>

      <div class="form-group">
        <label>จำนวนคน</label>
        <input type="number" id="people" min="1" max="10" placeholder="2"/>
      </div>

      <div class="form-group">
        <label>Special Request</label>
        <textarea id="special" placeholder="แพ้อาหาร, ขอเค้กวันเกิด..."></textarea>
      </div>

      <button class="btn-main" onclick="goSelectTable()">เลือกโต๊ะ →</button>

      <p class="auth-footer"><a href="index.html">← กลับหน้าหลัก</a></p>
    </div>

  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('user') || 'null')

    if (user?.email) document.getElementById('email').value = user.email

    const today = new Date().toISOString().split('T')[0]
    document.getElementById('date').min = today

    function goSelectTable() {
      const firstname = document.getElementById('firstname').value.trim()
      const lastname  = document.getElementById('lastname').value.trim()
      const phone     = document.getElementById('phone').value.trim()
      const email     = document.getElementById('email').value.trim()
      const date      = document.getElementById('date').value
      const time      = document.getElementById('time').value
      const people    = document.getElementById('people').value
      const special   = document.getElementById('special').value.trim()
      const errEl     = document.getElementById('error-msg')
      errEl.style.display = 'none'

      if (!firstname || !lastname || !phone || !email || !date || !time || !people) {
        errEl.textContent = 'กรุณากรอกข้อมูลให้ครบทุกช่อง'
        errEl.style.display = 'block'
        return
      }
      if (!/^[0-9]{10}$/.test(phone)) {
        errEl.textContent = 'เบอร์โทรต้องเป็นตัวเลข 10 หลัก'
        errEl.style.display = 'block'
        return
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errEl.textContent = 'รูปแบบ Email ไม่ถูกต้อง'
        errEl.style.display = 'block'
        return
      }

      sessionStorage.setItem('bookingData', JSON.stringify({
        firstname, lastname, phone, email, date, time,
        number_of_people: parseInt(people),
        special_request: special
      }))

      window.location.href = 'tables.html'
    }
    const API = 'http://localhost:3000'

  </script>
</body>
</html>
