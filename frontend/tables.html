<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เลือกโต๊ะ – Kaiseki Omakase</title>
  <link rel="stylesheet" href="css/tables.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fahkwang:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=KoHo:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <style>
    /* ===== TABLE CARD (ใหม่ - รูปโต๊ะ) ===== */
    .table-card {
      height: 120px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 1px;
      border: 1px solid transparent;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      gap: 6px;
      position: relative;
    }

    /* รูปโต๊ะ SVG inline */
    .table-icon {
      width: 48px;
      height: 48px;
    }

    .table-card h4 {
      font-size: 12px;
      letter-spacing: 2px;
      margin: 0;
    }

    .table-cap {
      font-size: 10px;
      opacity: 0.6;
    }

    /* สถานะ badge มุมบนขวา */
    .status-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .available .status-dot { background: #4a7c59; }
    .reserved  .status-dot { background: #c9a96e; }
    .occupied  .status-dot { background: #7a3030; }

    .table-card.selected {
      border-color: var(--gold) !important;
      box-shadow: 0 0 0 2px rgba(201,169,110,0.35), 0 8px 24px rgba(201,169,110,0.15);
    }

    /* ===== CONFIRM PANEL ===== */
    .confirm-panel { display: none; }
    .confirm-panel h3 {
      font-family: var(--font-title);
      font-size: 22px;
      color: var(--cream);
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    .confirm-table-badge {
      background: rgba(201,169,110,0.1);
      border: 1px solid rgba(201,169,110,0.3);
      color: var(--gold);
      padding: 10px 16px;
      border-radius: 6px;
      text-align: center;
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .confirm-rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .confirm-row  {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding-bottom: 10px;
      border-bottom: 1px solid #111;
    }
    .confirm-row span { color: var(--muted); letter-spacing: 1px; }
    .confirm-row strong { color: #eee; text-align: right; max-width: 60%; }

    /* summary box */
    .summary-box {
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.9;
      color: #aaa;
    }
    .summary-box strong { color: var(--cream); }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="top-nav">
    <a href="index.html" class="nav-logo">Kaiseki Omakase</a>
    <div class="nav-right">
      <span id="nav-user" class="nav-user"></span>
      <button class="btn-outline" onclick="logout()">ออกจากระบบ</button>
    </div>
  </nav>

  <div class="tables-container">

    <!-- LEFT: โต๊ะ -->
    <div class="tables-left">
      <div class="tables-header">
        <span class="section-label">Reservation</span>
        <h2>Table Reservation</h2>
        <p>เลือกโต๊ะที่ต้องการ</p>
        <a href="booking.html" class="btn-ghost" 
   style="display:inline-block;text-align:center;
          text-decoration:none;margin-bottom:16px;">
  ← แก้ไขข้อมูลการจอง
</a>
      </div>

      <!-- สรุปข้อมูลจาก booking -->
      <div id="booking-summary"></div>

      <div class="legend">
        <div class="legend-item"><span class="legend-dot available"></span>ว่าง</div>
        <div class="legend-item"><span class="legend-dot reserved"></span>จองแล้ว</div>
        <div class="legend-item"><span class="legend-dot occupied"></span>ใช้บริการอยู่</div>
      </div>

      <div class="tables-grid" id="tables-grid">
        <!-- skeleton -->
        <div class="table-skeleton"></div>
        <div class="table-skeleton"></div>
        <div class="table-skeleton"></div>
        <div class="table-skeleton"></div>
        <div class="table-skeleton"></div>
        <div class="table-skeleton"></div>
      </div>

      <p class="realtime-note">อัปเดตสถานะทุก 5 วินาที</p>
    </div>

    <!-- RIGHT: Confirm panel -->
    <div class="tables-right" id="reservation-panel">

      <!-- ก่อนเลือกโต๊ะ -->
      <div class="panel-placeholder" id="panel-placeholder">
        <div class="placeholder-icon">— —</div>
        <p>เลือกโต๊ะทางซ้ายเพื่อยืนยันการจอง</p>
      </div>

      <!-- หลังเลือกโต๊ะ -->
      <div class="confirm-panel" id="confirm-panel">
        <h3>ยืนยันการจอง</h3>

        <div id="res-error"   class="error-box"   style="display:none"></div>
        <div id="res-success" class="success-box" style="display:none"></div>

        <div class="confirm-table-badge" id="cf-table-badge">โต๊ะ —</div>

        <div class="confirm-rows">
          <div class="confirm-row"><span>โต๊ะ</span>        <strong id="cf-table"></strong></div>
          <div class="confirm-row"><span>ที่นั่ง</span>      <strong id="cf-capacity"></strong></div>
          <div class="confirm-row"><span>ชื่อ</span>         <strong id="cf-name"></strong></div>
          <div class="confirm-row"><span>โทรศัพท์</span>     <strong id="cf-phone"></strong></div>
          <div class="confirm-row"><span>อีเมล</span>        <strong id="cf-email"></strong></div>
          <div class="confirm-row"><span>วันที่</span>       <strong id="cf-date"></strong></div>
          <div class="confirm-row"><span>เวลา</span>         <strong id="cf-time"></strong></div>
          <div class="confirm-row"><span>จำนวนคน</span>     <strong id="cf-people"></strong></div>
          <div class="confirm-row"><span>คำขอพิเศษ</span>   <strong id="cf-special"></strong></div>
        </div>

        <button class="btn-main"  onclick="submitReservation()">✓ ยืนยันการจอง</button>
        <button class="btn-ghost" onclick="cancelSelection()">← เลือกโต๊ะใหม่</button>
      </div>

    </div>
  </div>

  <script>
    const API   = 'http://localhost:8000'
    const token = localStorage.getItem('token')
    const user  = JSON.parse(localStorage.getItem('user') || 'null')

    if (!token) {
      alert('กรุณาเข้าสู่ระบบก่อน')
      window.location.href = 'signin.html'
    }

    const bookingData = JSON.parse(sessionStorage.getItem('bookingData') || 'null')
    if (!bookingData) {
      alert('กรุณากรอกข้อมูลการจองก่อน')
      window.location.href = 'booking.html'
    }

    // แสดงชื่อ user
    const navUser = document.getElementById('nav-user')
    if (navUser && user) navUser.textContent = `สวัสดี, ${user.firstname}`

    // สรุปข้อมูลจาก booking
    const summaryEl = document.getElementById('booking-summary')
    if (summaryEl && bookingData) {
      summaryEl.innerHTML = `
        <div class="summary-box">
          <strong>${bookingData.firstname} ${bookingData.lastname}</strong><br>
          📅 ${bookingData.date} &nbsp; ⏰ ${bookingData.time}<br>
          👥 ${bookingData.number_of_people} คน
        </div>
      `
    }

    let selectedTable = null

    // SVG รูปโต๊ะ
    function tablesvg(color) {
      return `<svg class="table-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- หน้าโต๊ะ -->
        <rect x="8" y="24" width="48" height="8" rx="2" fill="${color}" opacity="0.9"/>
        <!-- ขาโต๊ะ -->
        <rect x="14" y="32" width="5" height="18" rx="2" fill="${color}" opacity="0.6"/>
        <rect x="45" y="32" width="5" height="18" rx="2" fill="${color}" opacity="0.6"/>
        <!-- เก้าอี้บน -->
        <rect x="10" y="14" width="13" height="9" rx="3" fill="${color}" opacity="0.4"/>
        <rect x="41" y="14" width="13" height="9" rx="3" fill="${color}" opacity="0.4"/>
        <!-- เก้าอี้ล่าง -->
        <rect x="10" y="51" width="13" height="9" rx="3" fill="${color}" opacity="0.4"/>
        <rect x="41" y="51" width="13" height="9" rx="3" fill="${color}" opacity="0.4"/>
      </svg>`
    }

    const colorMap = {
      available: '#4a7c59',
      reserved:  '#8a6a2a',
      occupied:  '#7a3030'
    }

    async function loadTables() {
      try {
        const res    = await fetch(`${API}/tables`)
        const tables = await res.json()
        renderTables(tables)
      } catch (err) {
        console.error('โหลดโต๊ะไม่สำเร็จ:', err)
      }
    }

    function renderTables(tables) {
      const grid = document.getElementById('tables-grid')
      grid.innerHTML = ''

      if (!tables.length) {
        grid.innerHTML = '<p style="color:#555;font-size:13px;grid-column:1/-1">ไม่พบข้อมูลโต๊ะ</p>'
        return
      }

      tables.forEach(t => {
        const card = document.createElement('div')
        card.className = `table-card ${t.status}`
        if (selectedTable?.table_id === t.table_id) card.classList.add('selected')

        const notEnough = bookingData && parseInt(bookingData.number_of_people) > t.capacity
        const color     = colorMap[t.status] || '#555'

        let badge = ''
        if (t.status === 'reserved')       badge = '<span style="font-size:10px;color:#c9a96e;letter-spacing:1px">จองแล้ว</span>'
        else if (t.status === 'occupied')  badge = '<span style="font-size:10px;color:#c97a7a;letter-spacing:1px">ใช้บริการอยู่</span>'
        else if (notEnough)                badge = `<span style="font-size:10px;color:#c97a7a">ที่นั่งไม่พอ</span>`
        else                               badge = '<span style="font-size:10px;color:#7abf8e;letter-spacing:1px">ว่าง</span>'

        card.innerHTML = `
          <div class="status-dot"></div>
          ${tablesvg(color)}
          <h4>โต๊ะ ${t.table_number}</h4>
          <p class="table-cap">${t.capacity} ที่นั่ง</p>
          ${badge}
        `

        if (t.status === 'available' && !notEnough) {
          card.onclick = () => selectTable(t)
        } else if (t.status === 'available' && notEnough) {
          card.style.opacity = '0.5'
          card.style.cursor  = 'not-allowed'
          card.onclick = () => showToast(`โต๊ะนี้รองรับได้ ${t.capacity} คน`, 'error')
        } else {
          card.style.cursor = 'not-allowed'
          card.onclick = () => showToast(
            t.status === 'reserved' ? `โต๊ะ ${t.table_number} มีคนจองแล้ว` : `โต๊ะ ${t.table_number} กำลังใช้บริการอยู่`,
            'error'
          )
        }

        grid.appendChild(card)
      })
    }

    function selectTable(table) {
      selectedTable = table

      document.getElementById('panel-placeholder').style.display = 'none'
      const panel = document.getElementById('confirm-panel')
      panel.style.display = 'block'

      const name = `โต๊ะ ${table.table_number}`
      document.getElementById('cf-table-badge').textContent = name
      document.getElementById('cf-table').textContent       = name
      document.getElementById('cf-capacity').textContent    = `${table.capacity} ที่นั่ง`
      document.getElementById('cf-name').textContent        = `${bookingData.firstname} ${bookingData.lastname}`
      document.getElementById('cf-phone').textContent       = bookingData.phone
      document.getElementById('cf-email').textContent       = bookingData.email
      document.getElementById('cf-date').textContent        = bookingData.date
      document.getElementById('cf-time').textContent        = bookingData.time
      document.getElementById('cf-people').textContent      = `${bookingData.number_of_people} คน`
      document.getElementById('cf-special').textContent     = bookingData.special_request || '-'

      clearMessages()
      loadTables()
    }

    function cancelSelection() {
      selectedTable = null
      document.getElementById('confirm-panel').style.display  = 'none'
      document.getElementById('panel-placeholder').style.display = 'flex'
      clearMessages()
      loadTables()
    }

    async function submitReservation() {
      if (!selectedTable || !bookingData) return

      const btn = document.querySelector('#confirm-panel .btn-main')
      btn.textContent = 'กำลังจอง...'
      btn.disabled    = true
      clearMessages()

      try {
        const res = await fetch(`${API}/reservations`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ ...bookingData, table_id: selectedTable.table_id })
        })

        const data = await res.json()

        if (res.ok) {
          showResSuccess('✅ จองสำเร็จ! กำลังพากลับหน้าหลัก...')
          sessionStorage.removeItem('bookingData')
          selectedTable = null
          await loadTables()
          setTimeout(() => { window.location.href = 'index.html' }, 3000)
        } else {
          showResError(data.message || 'จองไม่สำเร็จ')
        }
      } catch (err) {
        showResError('ไม่สามารถเชื่อมต่อ Server ได้')
      } finally {
        btn.textContent = '✓ ยืนยันการจอง'
        btn.disabled    = false
      }
    }

    function logout() {
      localStorage.removeItem('token')
      localStorage.removeItem('user')
      sessionStorage.removeItem('bookingData')
      window.location.href = 'signin.html'
    }

    function showResError(msg) {
      const el = document.getElementById('res-error')
      if (el) { el.textContent = msg; el.style.display = 'block' }
    }
    function showResSuccess(msg) {
      const el = document.getElementById('res-success')
      if (el) { el.textContent = msg; el.style.display = 'block' }
    }
    function clearMessages() {
      document.getElementById('res-error').style.display   = 'none'
      document.getElementById('res-success').style.display = 'none'
    }

    function showToast(msg, type = 'info') {
      let toast = document.getElementById('toast')
      if (!toast) {
        toast = document.createElement('div')
        toast.id = 'toast'
        toast.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
          color:#fff;padding:12px 28px;border-radius:30px;font-size:13px;
          z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.4);white-space:nowrap;`
        document.body.appendChild(toast)
      }
      toast.textContent       = msg
      toast.style.background  = type === 'error' ? '#8a3030' : '#2ecc71'
      toast.style.display     = 'block'
      clearTimeout(toast._t)
      toast._t = setTimeout(() => { toast.style.display = 'none' }, 3000)
    }

    loadTables()
    setInterval(loadTables, 5000)
  </script>
</body>
</html>
