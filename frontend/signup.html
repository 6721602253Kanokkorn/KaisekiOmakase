<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – Kaiseki Omakase</title>
  <link rel="stylesheet" href="css/signup.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fahkwang:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=KoHo:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="auth-bg"></div>

  <div class="auth-layout">

    <!-- ฝั่งซ้าย -->
    <div class="auth-deco">
      <a href="index.html" class="back-link">← Home</a>
      <h1 class="deco-title">Kaiseki<br>Omakase</h1>
    </div>

    <!-- ฝั่งขวา -->
    <div class="auth-side">
      <div class="auth-card">
        <h2>Registration</h2>
        <p class="auth-desc">กรอกข้อมูลเพื่อสมัครสมาชิก</p>

        <div id="error-msg" class="error-box" style="display:none"></div>
        <div id="success-msg" class="success-box" style="display:none"></div>

        <div class="form-row">
          <div class="form-group">
            <label>Firstname</label>
            <input type="text" id="firstname" placeholder="ชื่อ"/>
          </div>
          <div class="form-group">
            <label>Lastname</label>
            <input type="text" id="lastname" placeholder="นามสกุล"/>
          </div>
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="phone" placeholder="0812345678"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••"/>
        </div>

        <button class="btn-main" onclick="signUp()">Sign Up</button>

        <p class="auth-footer">มีบัญชีอยู่แล้วหรือไม่ <a href="signin.html">Sign In</a></p>
      </div>
    </div>

  </div>

  <script src="js/auth.js">
    const API = 'http://localhost:3000'

  </script>
</body>
</html>
