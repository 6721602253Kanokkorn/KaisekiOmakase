<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In – Kaiseki Omakase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fahkwang:wght@300;400;500&family=KoHo:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/signin.css"/>
</head>
<body>

  <div class="auth-bg"></div>

  <div class="auth-layout">

    <div class="auth-deco">
      <a href="index.html" class="back-link">← Home</a>
      <h1 class="deco-title">Kaiseki<br>Omakase</h1>
    </div>

    <div class="auth-side">
      <div class="auth-card">
        <h2>Sign In</h2>
        <p class="auth-desc">เข้าสู่ระบบเพื่อจองโต๊ะ</p>

        <div id="error-msg" class="error-box" style="display:none"></div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••"/>
        </div>

        <button class="btn-main" onclick="signIn()">Sign In</button>

        <p class="auth-footer">ยังไม่มีบัญชี? <a href="signup.html">Sign Up</a></p>
      </div>
    </div>

  </div>

  <script src="js/auth.js"></script>
</body>
</html>
